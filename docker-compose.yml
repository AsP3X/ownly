x-ownly-logging: &ownly-logging
  RUST_LOG: ${RUST_LOG:-debug}

x-ownly-internal-networks: &ownly-internal-networks
  networks:
    - ownly-internal

x-ownly-proxy-networks: &ownly-proxy-networks
  networks:
    - ownly-internal
    - proxy-network

x-ownly-compose-dev-secrets: &ownly-compose-dev-secrets
  JWT_SECRET: ownly-compose-local-dev-jwt-secret-not-for-production
  SETUP_TOKEN: ownly-compose-local-dev-setup-token-not-for-production-use
  SIGNING_SECRET: ownly-compose-local-dev-nos-signing-secret-not-for-production
  NOS_JWT_SECRET: ownly-compose-local-dev-nos-jwt-secret-not-for-production-use
  NOS_SIGNING_SECRET: ownly-compose-local-dev-nos-signing-secret-not-for-production
  OBJECT_STORAGE_JWT_SECRET: ownly-compose-local-dev-nos-jwt-secret-not-for-production-use

services:
  init-env:
    image: alpine:latest
    container_name: ownly-init-env
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - sh
      - -c
      - sed -e 's/\r$$//' /workspace/init-env.sh > /tmp/init-env.sh && sh /tmp/init-env.sh
    profiles:
      - init

  postgres:
    <<: *ownly-internal-networks
    image: postgres:16-alpine
    container_name: ownly-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ownly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ownly}
      POSTGRES_DB: ${POSTGRES_DB:-ownly}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ownly}"]
      interval: 5s
      timeout: 5s
      retries: 5

  object-storage:
    <<: *ownly-internal-networks
    build:
      context: ./nebular-os
      dockerfile: ../docker/nebular-os.Dockerfile
    container_name: ownly-object-storage
    environment:
      <<: [*ownly-compose-dev-secrets, *ownly-logging]
      NOS_BIND_ADDR: 0.0.0.0:9000
      NOS_DATA_DIR: /data/blobs
      NOS_META_PATH: /data/meta/metadata.db
      NOS_SOFT_DELETE_DROP_BLOB: ${NOS_SOFT_DELETE_DROP_BLOB:-true}
      NOS_MULTIPART_UPLOAD_TTL_SECS: ${NOS_MULTIPART_UPLOAD_TTL_SECS:-86400}
      NOS_RECOMPRESS_ON_STARTUP: ${NOS_RECOMPRESS_ON_STARTUP:-false}
      NOS_RECOMPRESS_INTERVAL_SECS: ${NOS_RECOMPRESS_INTERVAL_SECS:-3600}
      NOS_RECOMPRESS_BATCH_SIZE: ${NOS_RECOMPRESS_BATCH_SIZE:-100}
      NOS_ZSTD_LEVEL_UPLOAD: ${NOS_ZSTD_LEVEL_UPLOAD:-3}
      NOS_ZSTD_LEVEL: ${NOS_ZSTD_LEVEL:-22}
      NOS_ZSTD_DICT_ENABLED: ${NOS_ZSTD_DICT_ENABLED:-false}
      NOS_DEDUP_ENABLED: ${NOS_DEDUP_ENABLED:-false}
      NOS_COMPRESS_MIN_SIZE: ${NOS_COMPRESS_MIN_SIZE:-4096}
      NOS_COMPRESS_BLOCK_SIZE: ${NOS_COMPRESS_BLOCK_SIZE:-1048576}
      NOS_BLOCK_CACHE_ENTRIES: ${NOS_BLOCK_CACHE_ENTRIES:-256}
      NOS_MAX_BODY_SIZE: ${MAX_UPLOAD_BYTES:-10737418240}
      NOS_METADATA_MODE: ${NOS_METADATA_MODE:-full}
      NOS_UPLOAD_MAX_IN_FLIGHT_BYTES: ${NOS_UPLOAD_MAX_IN_FLIGHT_BYTES:-2147483648}
      NOS_BULK_DELETE_CONCURRENCY: ${NOS_BULK_DELETE_CONCURRENCY:-32}
      NOS_BULK_DELETE_BATCH_LIMIT: ${NOS_BULK_DELETE_BATCH_LIMIT:-1000}
      NOS_VERIFY_INTERVAL_SECS: ${NOS_VERIFY_INTERVAL_SECS:-0}
      NOS_VERIFY_BATCH_SIZE: ${NOS_VERIFY_BATCH_SIZE:-100}
      NOS_SCRUB_SAMPLE_DENOM: ${NOS_SCRUB_SAMPLE_DENOM:-1024}
      NOS_SCRUB_MODE: ${NOS_SCRUB_MODE:-deep}
      NOS_VERIFY_ON_READ: ${NOS_VERIFY_ON_READ:-false}
      NOS_READ_BUFFER_SIZE: ${NOS_READ_BUFFER_SIZE:-262144}
      NOS_WEBHOOKS_JSON: ${NOS_WEBHOOKS_JSON:-}
    ports:
      - "9000:9000"
    volumes:
      - nebular_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

  backend:
    <<: *ownly-proxy-networks
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: ownly-backend
    environment:
      <<: [*ownly-compose-dev-secrets, *ownly-logging]
      OWNLY_SKIP_DOTENV: "1"
      DATABASE_URL: ${DATABASE_URL:-postgres://ownly:ownly@postgres:5432/ownly}
      TMPDIR: /tmp
      OBJECT_STORAGE_URL: ${OBJECT_STORAGE_URL:-http://object-storage:9000}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL:-http://localhost:8080}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-media}
      STORAGE_MODE: ${STORAGE_MODE:-proxy}
      STORAGE_METADATA_MODE: ${STORAGE_METADATA_MODE:-nebular}
      URL_EXPIRY_SECONDS: ${URL_EXPIRY_SECONDS:-3600}
      BIND_ADDR: ${BIND_ADDR:-0.0.0.0:3000}
      OWNLY_ENVIRONMENT: ${OWNLY_ENVIRONMENT:-development}
      GIT_SHA: ${GIT_SHA:-unknown}
      AUTH_LOGIN_RPM: ${AUTH_LOGIN_RPM:-15}
      AUTH_REGISTER_RPM: ${AUTH_REGISTER_RPM:-5}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      OWNLY_ALLOW_PRIVATE_OUTBOUND: ${OWNLY_ALLOW_PRIVATE_OUTBOUND:-1}
      UPLOAD_RPM: ${UPLOAD_RPM:-1200}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10737418240}
      STORAGE_PUT_MAX_CONCURRENT: ${STORAGE_PUT_MAX_CONCURRENT:-2}
      OBJECT_STORAGE_REQUEST_TIMEOUT_SECS: ${OBJECT_STORAGE_REQUEST_TIMEOUT_SECS:-900}
      HLS_HARDWARE_ENCODE: ${HLS_HARDWARE_ENCODE:-auto}
      HLS_VAAPI_DEVICE: ${HLS_VAAPI_DEVICE:-/dev/dri/renderD128}
      HLS_VIDEO_CRF: ${HLS_VIDEO_CRF:-20}
      HLS_VIDEO_QUALITY: ${HLS_VIDEO_QUALITY:-22}
      HLS_FULL_TRANSCODE_QUALITY: ${HLS_FULL_TRANSCODE_QUALITY:-26}
      HLS_LARGE_MAXRATE: ${HLS_LARGE_MAXRATE:-5M}
      HLS_LARGE_BUFSIZE: ${HLS_LARGE_BUFSIZE:-10M}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy

  frontend:
    <<: *ownly-proxy-networks
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_LOG_LEVEL: ${VITE_LOG_LEVEL:-debug}
    container_name: ownly-frontend
    environment:
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10737418240}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-3600s}
      NGINX_PROXY_CONNECT_TIMEOUT: ${NGINX_PROXY_CONNECT_TIMEOUT:-120s}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  nebular_data:

networks:
  ownly-internal:
    driver: bridge
    internal: false
  proxy-network:
    name: proxy-network
    driver: bridge
