services:
  init-env:
    image: alpine:latest
    container_name: mediavault-init-env
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - sh
      - -c
      - sed -e 's/\r$$//' /workspace/init-env.sh > /tmp/init-env.sh && sh /tmp/init-env.sh
    profiles:
      - init

  postgres:
    image: postgres:16-alpine
    container_name: mediavault-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediavault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediavault}
      POSTGRES_DB: ${POSTGRES_DB:-mediavault}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mediavault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  object-storage:
    build:
      context: ./nebular-os
      dockerfile: Dockerfile
    container_name: mediavault-object-storage
    environment:
      # Human: Local Compose dev-only secrets (>=32 chars); override via .env for real deployments.
      # Agent: EMPTY host env falls back here; NOT in KNOWN_WEAK_SECRETS; shared with backend OBJECT_STORAGE_JWT_SECRET.
      NOS_JWT_SECRET: ${NOS_JWT_SECRET:-ownly-compose-local-dev-nos-jwt-secret-not-for-production-use}
      NOS_SIGNING_SECRET: ${NOS_SIGNING_SECRET:-ownly-compose-local-dev-nos-signing-secret-not-for-production}
      NOS_BIND_ADDR: 0.0.0.0:9000
      NOS_DATA_DIR: /data/blobs
      NOS_META_PATH: /data/meta/metadata.db
      # Human: Reclaim blob disk promptly on delete and re-compress legacy raw blobs in the background.
      # Agent: NOS_SOFT_DELETE_DROP_BLOB drops files on soft-delete; NOS_RECOMPRESS_* migrates pre-zstd objects.
      NOS_SOFT_DELETE_DROP_BLOB: ${NOS_SOFT_DELETE_DROP_BLOB:-true}
      NOS_MULTIPART_UPLOAD_TTL_SECS: ${NOS_MULTIPART_UPLOAD_TTL_SECS:-86400}
      NOS_RECOMPRESS_ON_STARTUP: ${NOS_RECOMPRESS_ON_STARTUP:-true}
      NOS_RECOMPRESS_INTERVAL_SECS: ${NOS_RECOMPRESS_INTERVAL_SECS:-3600}
      NOS_RECOMPRESS_BATCH_SIZE: ${NOS_RECOMPRESS_BATCH_SIZE:-100}
      # Human: Object PUT limit must be >= backend MAX_UPLOAD_BYTES or large uploads fail at storage.
      # Agent: READS MAX_UPLOAD_BYTES from .env; DEFAULT 10 GiB when unset.
      NOS_MAX_BODY_SIZE: ${MAX_UPLOAD_BYTES:-10737418240}
      # Human: Operator token for Ownly to apply runtime cluster config via PUT /_cluster/config.
      # Agent: MUST match backend NOS_CLUSTER_BOOTSTRAP_TOKEN; ≥32 chars.
      NOS_CLUSTER_BOOTSTRAP_TOKEN: ${NOS_CLUSTER_BOOTSTRAP_TOKEN:-ownly-compose-local-dev-nos-cluster-bootstrap-token-not-for-production}
      RUST_LOG: info
    ports:
      - "9000:9000"
    volumes:
      - nebular_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: mediavault-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://mediavault:mediavault@postgres:5432/mediavault}
      TMPDIR: /tmp
      # Human: Local Compose dev-only secrets (>=32 chars); override via .env for real deployments.
      # Agent: MUST match object-storage NOS_JWT_SECRET default when host env is unset.
      JWT_SECRET: ${JWT_SECRET:-ownly-compose-local-dev-mediavault-jwt-secret-not-for-production}
      # Human: Presigned signatures must match Nebular's NOS_SIGNING_SECRET in local Compose.
      # Agent: KEEP fallback aligned with object-storage NOS_SIGNING_SECRET to avoid 401 invalid signature.
      SIGNING_SECRET: ${SIGNING_SECRET:-ownly-compose-local-dev-nos-signing-secret-not-for-production}
      OBJECT_STORAGE_JWT_SECRET: ${NOS_JWT_SECRET:-ownly-compose-local-dev-nos-jwt-secret-not-for-production-use}
      # Human: Presigned download URLs must use Nebular's HMAC secret (read by create_app_state).
      # Agent: PASS NOS_SIGNING_SECRET into backend; lib.rs prefers this over SIGNING_SECRET for storage.
      NOS_SIGNING_SECRET: ${NOS_SIGNING_SECRET:-ownly-compose-local-dev-nos-signing-secret-not-for-production}
      OBJECT_STORAGE_URL: ${OBJECT_STORAGE_URL:-http://object-storage:9000}
      # Human: Browser-facing base for presigned GETs — use the web origin (port 8080) when nginx proxies /media/.
      # Agent: DEFAULT localhost:8080 not :9000; OVERRIDE with public host (e.g. http://corespace.de:8089) in production.
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL:-http://localhost:8080}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-media}
      STORAGE_MODE: ${STORAGE_MODE:-proxy}
      URL_EXPIRY_SECONDS: ${URL_EXPIRY_SECONDS:-3600}
      RUST_LOG: ${RUST_LOG:-info}
      BIND_ADDR: ${BIND_ADDR:-0.0.0.0:3000}
      MEDIAVAULT_ENVIRONMENT: ${MEDIAVAULT_ENVIRONMENT:-development}
      GIT_SHA: ${GIT_SHA:-unknown}
      AUTH_LOGIN_RPM: ${AUTH_LOGIN_RPM:-15}
      AUTH_REGISTER_RPM: ${AUTH_REGISTER_RPM:-5}
      UPLOAD_RPM: ${UPLOAD_RPM:-600}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10737418240}
      # Human: Shared with Nebular NOS_CLUSTER_BOOTSTRAP_TOKEN for runtime cluster configuration.
      # Agent: READ by nebular_cluster::sync_storage_cluster on setup and Add Storage Node.
      NOS_CLUSTER_BOOTSTRAP_TOKEN: ${NOS_CLUSTER_BOOTSTRAP_TOKEN:-ownly-compose-local-dev-nos-cluster-bootstrap-token-not-for-production}
      # Human: Optional GPU HLS ingest — auto|off|nvenc|vaapi|qsv (defaults to auto; CPU when no GPU).
      # Agent: READ by hls::hardware at startup; for NVENC use docker-compose.gpu.yml (NVIDIA toolkit required).
      HLS_HARDWARE_ENCODE: ${HLS_HARDWARE_ENCODE:-auto}
      HLS_VAAPI_DEVICE: ${HLS_VAAPI_DEVICE:-/dev/dri/renderD128}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediavault-frontend
    environment:
      # Human: nginx client_max_body_size uses the same byte cap as the API.
      # Agent: envsubst in nginx.conf.template; NGINX_PROXY_READ_TIMEOUT for multi-GB uploads.
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10737418240}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-3600s}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  nebular_data:
