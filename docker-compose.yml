# Human: Zero-config stack — these literals are injected into containers; no `.env` or init-env required.
# Agent: NOT ${VAR} — host `.env` and shell exports cannot override; edit here only for custom production secrets.
x-ownly-compose-dev-secrets: &ownly-compose-dev-secrets
  JWT_SECRET: ownly-compose-local-dev-jwt-secret-not-for-production
  SETUP_TOKEN: ownly-compose-local-dev-setup-token-not-for-production-use
  SIGNING_SECRET: ownly-compose-local-dev-nos-signing-secret-not-for-production
  NOS_JWT_SECRET: ownly-compose-local-dev-nos-jwt-secret-not-for-production-use
  NOS_SIGNING_SECRET: ownly-compose-local-dev-nos-signing-secret-not-for-production
  OBJECT_STORAGE_JWT_SECRET: ownly-compose-local-dev-nos-jwt-secret-not-for-production-use

services:
  init-env:
    image: alpine:latest
    container_name: ownly-init-env
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - sh
      - -c
      - sed -e 's/\r$$//' /workspace/init-env.sh > /tmp/init-env.sh && sh /tmp/init-env.sh
    profiles:
      - init

  postgres:
    image: postgres:16-alpine
    container_name: ownly-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ownly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ownly}
      POSTGRES_DB: ${POSTGRES_DB:-ownly}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ownly}"]
      interval: 5s
      timeout: 5s
      retries: 5

  object-storage:
    build:
      context: ./nebular-os
      # Human: Ownly Dockerfile adds migrations/ for compile-time include_str (see docker/nebular-os.Dockerfile).
      # Agent: CONTEXT nebular-os; dockerfile path relative to compose file root.
      dockerfile: ../docker/nebular-os.Dockerfile
    container_name: ownly-object-storage
    environment:
      <<: *ownly-compose-dev-secrets
      NOS_BIND_ADDR: 0.0.0.0:9000
      NOS_DATA_DIR: /data/blobs
      NOS_META_PATH: /data/meta/metadata.db
      # Human: Reclaim blob disk promptly on delete; re-compress legacy blobs on an interval, not at boot.
      # Agent: NOS_RECOMPRESS_ON_STARTUP false by default — Nebular blocks HTTP until boot recompress finishes (minutes on large volumes).
      NOS_SOFT_DELETE_DROP_BLOB: ${NOS_SOFT_DELETE_DROP_BLOB:-true}
      NOS_MULTIPART_UPLOAD_TTL_SECS: ${NOS_MULTIPART_UPLOAD_TTL_SECS:-86400}
      NOS_RECOMPRESS_ON_STARTUP: ${NOS_RECOMPRESS_ON_STARTUP:-false}
      NOS_RECOMPRESS_INTERVAL_SECS: ${NOS_RECOMPRESS_INTERVAL_SECS:-3600}
      NOS_RECOMPRESS_BATCH_SIZE: ${NOS_RECOMPRESS_BATCH_SIZE:-100}
      # Human: zstd upload vs maintenance levels — fast PUT then background upgrade (see docs/storage-disk-tuning.md).
      # Agent: NOS_ZSTD_LEVEL_UPLOAD default 3; NOS_ZSTD_LEVEL default 22; optional dict/dedup off by default.
      NOS_ZSTD_LEVEL_UPLOAD: ${NOS_ZSTD_LEVEL_UPLOAD:-3}
      NOS_ZSTD_LEVEL: ${NOS_ZSTD_LEVEL:-22}
      NOS_ZSTD_DICT_ENABLED: ${NOS_ZSTD_DICT_ENABLED:-false}
      NOS_DEDUP_ENABLED: ${NOS_DEDUP_ENABLED:-false}
      # Human: Object PUT limit must be >= backend MAX_UPLOAD_BYTES or large uploads fail at storage.
      # Agent: READS MAX_UPLOAD_BYTES from .env; DEFAULT 10 GiB when unset.
      NOS_MAX_BODY_SIZE: ${MAX_UPLOAD_BYTES:-10737418240}
      RUST_LOG: info
    ports:
      - "9000:9000"
    volumes:
      - nebular_data:/data
    # Human: Nebular OS binds HTTP only after NOS_RECOMPRESS_ON_STARTUP finishes — large volumes can take many minutes.
    # Agent: start_period 10m + retries covers boot recompression; backend depends_on service_healthy.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 600s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: ownly-backend
    environment:
      <<: *ownly-compose-dev-secrets
      OWNLY_SKIP_DOTENV: "1"
      DATABASE_URL: ${DATABASE_URL:-postgres://ownly:ownly@postgres:5432/ownly}
      TMPDIR: /tmp
      OBJECT_STORAGE_URL: ${OBJECT_STORAGE_URL:-http://object-storage:9000}
      # Human: Browser-facing base for presigned GETs — use the web origin (port 8080) when nginx proxies /media/.
      # Agent: DEFAULT localhost:8080 not :9000; OVERRIDE with public host (e.g. http://corespace.de:8089) in production.
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL:-http://localhost:8080}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-media}
      STORAGE_MODE: ${STORAGE_MODE:-proxy}
      STORAGE_METADATA_MODE: ${STORAGE_METADATA_MODE:-nebular}
      URL_EXPIRY_SECONDS: ${URL_EXPIRY_SECONDS:-3600}
      RUST_LOG: ${RUST_LOG:-info}
      BIND_ADDR: ${BIND_ADDR:-0.0.0.0:3000}
      OWNLY_ENVIRONMENT: ${OWNLY_ENVIRONMENT:-development}
      GIT_SHA: ${GIT_SHA:-unknown}
      AUTH_LOGIN_RPM: ${AUTH_LOGIN_RPM:-15}
      AUTH_REGISTER_RPM: ${AUTH_REGISTER_RPM:-5}
      UPLOAD_RPM: ${UPLOAD_RPM:-600}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10737418240}
      # Human: Optional GPU HLS ingest — auto|off|nvenc|vaapi|qsv (defaults to auto; CPU when no GPU).
      # Agent: READ by hls::hardware at startup; for NVENC use docker-compose.gpu.yml (NVIDIA toolkit required).
      HLS_HARDWARE_ENCODE: ${HLS_HARDWARE_ENCODE:-auto}
      HLS_VAAPI_DEVICE: ${HLS_VAAPI_DEVICE:-/dev/dri/renderD128}
      # Human: Raise CRF/CQ to shrink HLS segments on disk (lower quality). See docs/storage-disk-tuning.md.
      HLS_VIDEO_CRF: ${HLS_VIDEO_CRF:-20}
      HLS_VIDEO_QUALITY: ${HLS_VIDEO_QUALITY:-22}
      HLS_FULL_TRANSCODE_QUALITY: ${HLS_FULL_TRANSCODE_QUALITY:-26}
      HLS_LARGE_MAXRATE: ${HLS_LARGE_MAXRATE:-5M}
      HLS_LARGE_BUFSIZE: ${HLS_LARGE_BUFSIZE:-10M}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Human: Must match backend SETUP_TOKEN literal for the setup wizard (zero-config, no .env).
        # Agent: BUILD-TIME only; same string as x-ownly-compose-dev-secrets SETUP_TOKEN.
        VITE_SETUP_TOKEN: ownly-compose-local-dev-setup-token-not-for-production-use
    container_name: ownly-frontend
    environment:
      # Human: nginx client_max_body_size uses the same byte cap as the API.
      # Agent: envsubst in nginx.conf.template; NGINX_PROXY_READ_TIMEOUT for multi-GB uploads.
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10737418240}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-3600s}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  nebular_data:
